{% extends "base.html" %}
{% block title %}Conditions{% endblock %}
{% block nav_conditions_active %}active{% endblock %}

{% block content %}
<div class="conditions-page">
    <div class="conditions-header">
        <h2>Conditions Editor</h2>
        <div class="conditions-header-actions">
            <button class="btn btn-outline btn-sm" id="reloadBtn">Reload from YAML</button>
            <button class="btn btn-primary btn-sm" id="addConditionBtn">+ Add Condition</button>
        </div>
    </div>

    <div class="conditions-table-wrap">
        <table class="conditions-table" id="conditionsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Doctor</th>
                    <th>Duration</th>
                    <th>Priority</th>
                </tr>
            </thead>
            <tbody id="conditionsBody">
                <tr><td colspan="6" style="text-align:center; padding:40px; color:var(--gray-400);">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display: none;">
    <div class="modal-card" style="max-width: 700px;">
        <div class="modal-header">
            <h3 id="editModalTitle">Edit Condition</h3>
            <button class="modal-close" id="editModalClose">&times;</button>
        </div>
        <div class="modal-body">
            <form id="conditionForm" class="condition-form">
                <input type="hidden" id="cf-id">
                <div class="cond-form-grid">
                    <div class="form-group">
                        <label class="form-label" for="cf-name">Name</label>
                        <input type="text" class="form-input" id="cf-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-category">Category</label>
                        <select class="form-input" id="cf-category">
                            <option value="A">A - Urgent</option>
                            <option value="B">B - Semi-urgent</option>
                            <option value="C">C - Standard</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label" for="cf-description">Description</label>
                        <textarea class="form-input" id="cf-description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-doctor">Doctor</label>
                        <select class="form-input" id="cf-doctor">
                            <option value="">None</option>
                            <option value="HS">HS (Dr. Skensved)</option>
                            <option value="LB">LB (Dr. Bune)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-duration">Duration (min)</label>
                        <input type="number" class="form-input" id="cf-duration" min="5" step="5">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-priority">Priority</label>
                        <select class="form-input" id="cf-priority">
                            <option value="">None</option>
                            <option value="same_day">Same day</option>
                            <option value="1_2_days">1-2 days</option>
                            <option value="1_week">1 week</option>
                            <option value="2_weeks">2 weeks</option>
                            <option value="4_weeks">4 weeks</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-keywords">Keywords (comma-separated)</label>
                        <input type="text" class="form-input" id="cf-keywords">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-cycle-days">Cycle Days (e.g. 5,10)</label>
                        <input type="text" class="form-input" id="cf-cycle-days" placeholder="e.g. 5,10 or just_before_next_period">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Condition-Specific Questions</label>
                        <div id="cf-questions-list" class="questions-list"></div>
                        <button type="button" class="btn btn-outline btn-sm" id="addQuestionBtn" style="margin-top: 6px;">+ Add Question</button>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Questionnaires</label>
                        <div id="cf-questionnaires-list" class="questionnaires-list"></div>
                        <button type="button" class="btn btn-outline btn-sm" id="addQuestionnaireBtn" style="margin-top: 6px;">+ Add Questionnaire</button>
                    </div>

                    <!-- Triage Fields -->
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Contraindications</label>
                        <div id="cf-contraindications-list" class="questions-list"></div>
                        <button type="button" class="btn btn-outline btn-sm" id="addContraindicationBtn" style="margin-top: 6px;">+ Add Contraindication</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-age-min">Min Age</label>
                        <input type="number" class="form-input" id="cf-age-min" min="0" max="120">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-age-max">Max Age</label>
                        <input type="number" class="form-input" id="cf-age-max" min="0" max="120">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-visits-required">Visits Required</label>
                        <input type="number" class="form-input" id="cf-visits-required" min="1">
                    </div>

                    <!-- Patient Preparation -->
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Preparation Instructions</label>
                        <div id="cf-preparation-list" class="questions-list"></div>
                        <button type="button" class="btn btn-outline btn-sm" id="addPreparationBtn" style="margin-top: 6px;">+ Add Instruction</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-companion-required">
                            <input type="checkbox" id="cf-companion-required"> Companion / Driver Required
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-estimated-recovery">Estimated Recovery</label>
                        <input type="text" class="form-input" id="cf-estimated-recovery" placeholder="e.g. 1-2 days rest">
                    </div>

                    <!-- Clinic / Scheduling -->
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Equipment Required</label>
                        <div id="cf-equipment-list" class="questions-list"></div>
                        <button type="button" class="btn btn-outline btn-sm" id="addEquipmentBtn" style="margin-top: 6px;">+ Add Equipment</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-followup-interval">Follow-up Interval</label>
                        <input type="text" class="form-input" id="cf-followup-interval" placeholder="e.g. 6 months">
                    </div>

                    <!-- Lab Requirements -->
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Lab Requirements</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                            <div>
                                <label class="form-label" for="cf-lab-test" style="font-size: 0.8rem; margin-bottom: 2px;">Test name(s)</label>
                                <input type="text" class="form-input" id="cf-lab-test" placeholder="e.g. chlamydia (comma-separate multiple)">
                            </div>
                            <div>
                                <label class="form-label" for="cf-lab-condition" style="font-size: 0.8rem; margin-bottom: 2px;">Age condition</label>
                                <select class="form-input" id="cf-lab-condition">
                                    <option value="">No lab required</option>
                                    <option value="always">Always</option>
                                    <option value="age_under_30">Under 30 only</option>
                                    <option value="age_under_45">Under 45 only</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="form-label" for="cf-lab-description" style="font-size: 0.8rem; margin-bottom: 2px;">Description</label>
                            <input type="text" class="form-input" id="cf-lab-description" placeholder="e.g. Negative chlamydia test required for patients under 30">
                        </div>
                    </div>

                    <!-- Guidance Document -->
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label" for="cf-guidance-document">Guidance Document</label>
                        <input type="text" class="form-input" id="cf-guidance-document" placeholder="Document name or URL">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="cf-self-pay">Self-Pay Price (DKK)</label>
                        <input type="number" class="form-input" id="cf-self-pay" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cf-referral-required">
                            <input type="checkbox" id="cf-referral-required"> Referral Required
                        </label>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label" for="cf-special-instructions">Special Instructions (agent rules for this condition)</label>
                        <textarea class="form-input" id="cf-special-instructions" rows="4" placeholder="e.g. ROUTING: Ask age. If >45 → doctor=HS. If ≤45 → doctor=LB."></textarea>
                    </div>
                </div>
                <div class="condition-form-actions">
                    <button type="button" class="btn btn-outline" id="editCancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/conditions.js?v=20260309a"></script>
{% endblock %}
